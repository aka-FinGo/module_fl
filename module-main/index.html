<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aristokrat ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <header class="app-bar">
        <div class="header-content">
            <h2 id="app-title">Aristokrat Mebel</h2>
        </div>
    </header>

    <main id="main-container">
        <section id="page-home" class="page active">
            <div class="hero-card">
                <h3>Xush kelibsiz!</h3>
                <p>Modulni yig'ishni boshlash uchun skanerlang.</p>
            </div>
            <div id="history-container" class="mt-10">
                <h3>Oxirgi ko'rilganlar:</h3>
                <div id="history-list"></div>
            </div>
        </section>

        <section id="page-scanner" class="page">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <button id="btn-torch" class="btn btn-primary" style="width: 48%;">🔦 Chiroq</button>
                <button class="btn btn-danger" style="width: 48%;" onclick="stopScanner()">Bekor qilish</button>
            </div>
            <div id="reader-container"><div id="reader"></div></div>
        </section>

        <section id="page-content" class="page">
            <div id="skeleton-loader" class="hidden">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width: 70%;"></div>
            </div>
            <div id="dynamic-content" class="scrollable"></div>
        </section>
    </main>

    <footer class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home')" id="nav-home">
            <span class="icon">🏠</span><span class="label">Asosiy</span>
        </button>
        <button class="nav-item disabled" onclick="renderFurnitura()" id="nav-fur">
            <span class="icon">📦</span><span class="label">Furnitura</span>
        </button>
        
        <div class="fab-wrapper">
            <button class="fab-button" onclick="startScan()" id="nav-scan">
                <span class="icon">📷</span>
            </button>
        </div>

        <button class="nav-item disabled" onclick="renderIframe('pdf')" id="nav-pdf">
            <span class="icon">📐</span><span class="label">Chizma</span>
        </button>
        <button class="nav-item disabled" onclick="renderIframe('video')" id="nav-vid">
            <span class="icon">🎬</span><span class="label">Video</span>
        </button>
    </footer>

    <div id="fullscreen-modal" class="hidden">
        <div class="modal-header">
            <h3 id="modal-title-text">Hujjat</h3>
            <button class="btn btn-danger" onclick="closeNativeFullscreen()">Yopish (X)</button>
        </div>
        <div id="modal-body">
            <div id="anti-leak-shield" class="hidden"></div>
            <div id="iframe-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
