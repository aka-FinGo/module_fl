name: cabix_konveyer
description: Cabix Konveyer ERP tizimi.
publish_to: 'none'
version: 1.0.1+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  mobile_scanner: ^5.0.0
  image_picker: ^1.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  video_player: ^2.8.7
  pdfx: ^2.9.2
  screen_protector: ^1.3.3
  audioplayers: ^6.6.0
  webview_flutter: ^4.7.0
  pointer_interceptor: ^0.10.1+1
  connectivity_plus: ^6.1.5
  flutter_cache_manager: ^3.3.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - web/icons/